apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../tenant-base

patches:
  - target:
      kind: Namespace
      name: TENANT_NAMESPACE
    patch: |
      - op: replace
        path: /metadata/name
        value: ds-team-beta
      - op: replace
        path: /metadata/annotations/openshift.io~1description
        value: "Ray workload namespace for Data Science Team Beta"

  - target:
      kind: ResourceQuota
      name: ray-quota
    patch: |
      - op: replace
        path: /metadata/namespace
        value: ds-team-beta
      - op: replace
        path: /spec/hard/requests.cpu
        value: "8"
      - op: replace
        path: /spec/hard/requests.memory
        value: 32Gi
      - op: replace
        path: /spec/hard/requests.nvidia.com~1gpu
        value: "2"
      - op: replace
        path: /spec/hard/limits.cpu
        value: "16"
      - op: replace
        path: /spec/hard/limits.memory
        value: 64Gi

  - target:
      kind: LimitRange
      name: ray-limits
    patch: |
      - op: replace
        path: /metadata/namespace
        value: ds-team-beta
      - op: replace
        path: /spec/limits/0/max/cpu
        value: "16"
      - op: replace
        path: /spec/limits/0/max/memory
        value: 64Gi

  - target:
      kind: LocalQueue
      name: default
    patch: |
      - op: replace
        path: /metadata/namespace
        value: ds-team-beta

  - target:
      kind: Role
      name: ray-tenant-user
    patch: |
      - op: replace
        path: /metadata/namespace
        value: ds-team-beta

  - target:
      kind: RoleBinding
      name: ray-tenant-binding
    patch: |
      - op: replace
        path: /metadata/namespace
        value: ds-team-beta
      - op: replace
        path: /subjects/0/name
        value: ds-team-beta-users

  - target:
      kind: RoleBinding
      name: ray-scc-binding
    patch: |
      - op: replace
        path: /metadata/namespace
        value: ds-team-beta
      - op: replace
        path: /subjects/0/namespace
        value: ds-team-beta

  - target:
      kind: ServiceAccount
      name: ray-service-account
    patch: |
      - op: replace
        path: /metadata/namespace
        value: ds-team-beta

  - target:
      kind: RoleBinding
      name: ray-sa-binding
    patch: |
      - op: replace
        path: /metadata/namespace
        value: ds-team-beta
      - op: replace
        path: /subjects/0/namespace
        value: ds-team-beta
      - op: replace
        path: /subjects/1/namespace
        value: ds-team-beta
