apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ray-scc-binding
  namespace: TENANT_NAMESPACE
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:nonroot-v2
subjects:
  - kind: ServiceAccount
    name: default
    namespace: TENANT_NAMESPACE
  - kind: ServiceAccount
    name: ray-service-account
    namespace: TENANT_NAMESPACE
